<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="100%" height="100%">
  <defs>
    <clipPath id="top-clip-stacked">
      <rect x="0" y="0" width="120" height="75" />
    </clipPath>
    <clipPath id="bottom-clip-stacked">
      <rect x="0" y="75" width="120" height="75" />
    </clipPath>
  </defs>

  <!-- EMBLEM CONTAINER (Centered Top: x=140, y=10, w=120, h=150) -->
  <g transform="translate(140, 10)">
    <!-- Top Half: White Fill, Green Border -->
    <g clip-path="url(#top-clip-stacked)">
      <path d="M 60 5 C 25 5, 5 40, 5 75 L 115 75 C 115 40, 95 5, 60 5 Z" fill="#FFFFFF" stroke="#2BB673" stroke-width="4.5" />
    </g>

    <!-- Bottom Half: Solid Green Fill -->
    <g clip-path="url(#bottom-clip-stacked)">
      <path d="M 5 75 C 5 110, 25 145, 60 145 C 95 145, 115 110, 115 75 Z" fill="#2BB673" stroke="#2BB673" stroke-width="4.5" />
    </g>

    <!-- Center Dividing Line -->
    <line x1="5" y1="75" x2="115" y2="75" stroke="#2BB673" stroke-width="4" />

    <!-- TOP EMBLEM: Sprout Plant & Dots (Green #2BB673) -->
    <path d="M 60 70 L 60 38" stroke="#2BB673" stroke-width="4" stroke-linecap="round" />
    <path d="M 60 38 C 52 26, 60 18, 60 18 C 60 18, 68 26, 60 38 Z" fill="#2BB673" />
    <path d="M 58 48 C 42 40, 38 52, 38 52 C 38 52, 52 56, 58 48 Z" fill="#2BB673" />
    <path d="M 62 48 C 78 40, 82 52, 82 52 C 82 52, 68 56, 62 48 Z" fill="#2BB673" />
    <circle cx="44" cy="30" r="2" fill="#2BB673" />
    <circle cx="76" cy="30" r="2" fill="#2BB673" />
    <circle cx="60" cy="24" r="1.5" fill="#2BB673" />

    <!-- BOTTOM EMBLEM: Roots & Dashed Border (White #FFFFFF) -->
    <path d="M 60 80 L 60 115" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    <path d="M 60 90 L 44 100 M 60 102 L 40 116 M 44 100 L 36 96" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 60 90 L 76 100 M 60 102 L 80 116 M 76 100 L 84 96" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 20 85 C 20 120, 35 135, 60 135 C 85 135, 100 120, 100 85" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="6,5" opacity="0.9" />
    <circle cx="34" cy="94" r="1.5" fill="#FFFFFF" />
    <circle cx="86" cy="94" r="1.5" fill="#FFFFFF" />
  </g>

  <!-- TYPOGRAPHY: NECTAR FARMS (Centered Bottom with Wide Margins) -->
  <text x="200" y="195" text-anchor="middle" font-family="'Inter', 'Oswald', 'Montserrat', sans-serif" font-weight="800" font-size="30" fill="#2D312E" letter-spacing="3">NECTAR FARMS</text>
</svg>
